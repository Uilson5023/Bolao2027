{% extends "base.html" %}
{% block title %}Entrar - Bolão{% endblock %}
{% block content %}
<div class="card" style="max-width:420px;margin:0 auto;">
  <h2>Entrar</h2>
  <form method="post">
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" name="email" required>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" name="senha" required>
    </div>
    <button class="btn" type="submit">Entrar</button>
  </form>
  <p style="margin-top:14px;font-size:0.9rem;">Ainda não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se</a></p>
  <p style="margin-top:8px;font-size:0.8rem;color:#888;">Acesso do organizador (admin): admin@bolao.com / admin123</p>
</div>
{% endblock %}
